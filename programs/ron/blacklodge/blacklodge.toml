[program]
program_id = "com.ron.blacklodge"
program_version = "0.1.0"
abi_version = ">=1.0,<2.0"
program_name = "Blacklodge"
author = "ron"
license = "GPL-3.0"
categories = ["Render", "Pattern", "Film"]
program_type = "synthesis"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"
description = "Red Room from Twin Peaks: deep crimson curtain folds above a warm cream/brown chevron floor with perspective compression."

# --- Rotary Potentiometers (Knobs 1-6) ---

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Folds"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 600
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Depth"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 700
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Chevron"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 500
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Perspect"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 600
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Horizon"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 480
display_min_value = 0
display_max_value = 100
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "ChevFreq"
value_labels = ["/16", "/8", "/4", "/2", "x1", "x2", "x4", "x8"]
initial_value_label = "x1"

# --- Toggle Switches (7-11) ---

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Sway"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Chev Mode"
value_labels = ["Straight", "Vee"]
initial_value_label = "Straight"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Warmth"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Vignette"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

# --- Linear Potentiometer (Slider) ---

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Bright"
control_mode = "linear"
min_value = 0
max_value = 1023
initial_value = 900
display_min_value = 0
display_max_value = 100
suffix_label = "%"

# --- Presets ---

